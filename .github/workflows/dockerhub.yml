name: Subir imagen a docker

on: 
  push:
    branches: 
      - main

jobs:
  build-and-push:
    name: Construir y subir imagen
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo del respositorio
        uses: actions/checkout@v4

      - name: Iniciar sesion en dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_TOKEN}}

      - name: Contruir y subir imagen
        uses: docker/build-push-action@v6
        with:  
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME}}/mi-clase-docker:latest